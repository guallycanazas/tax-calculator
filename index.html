<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Calculator</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Tax Calculator</h1>
    <div class="form-group">
      <label for="income">Annual Income ($):</label>
      <input type="number" id="income" placeholder="Enter your income" min="0" />
    </div>
    <div class="form-group">
      <label for="filingStatus">Filing Status:</label>
      <select id="filingStatus">
        <option value="single">Single</option>
        <option value="married">Married Filing Jointly</option>
      </select>
    </div>
    <button onclick="calculate()">Calculate Tax</button>
    <div id="result" class="result hidden">
      <h2>Results</h2>
      <p>Gross Income: <span id="grossIncome"></span></p>
      <p>Estimated Tax: <span id="taxAmount"></span></p>
      <p>Effective Tax Rate: <span id="taxRate"></span></p>
      <p>After-Tax Income: <span id="afterTax"></span></p>
    </div>
  </div>
  <script src="taxCalculator.js"></script>
  <script src="script.js"></script>
</body>
</html>
